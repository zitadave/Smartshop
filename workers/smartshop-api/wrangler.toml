name = "smartshop-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# KV Namespace for caching settings
# Create this in Cloudflare Dashboard: Workers → KV → Create Namespace
# kv_namespaces = [
#   { binding = "SMART_SHOP_KV", id = "your-kv-id-here" }
# ]

# D1 Database for future use
# Create in Cloudflare Dashboard: Workers → D1 → Create Database
# [[d1_databases]]
# binding = "DB"
# database_name = "smartshop-db"
# database_id = "your-db-id-here"

# Environment variables
# [vars]
# TELEGRAM_BOT_TOKEN = "your-bot-token"

# Routes to trigger this worker
# routes = [
#   { pattern = "smartshop.pages.dev/api/*", zone_id = "your-zone-id" }
# ]

# Cron Triggers (3 free)
[triggers]
crons = ["0 */6 * * *"]  # Every 6 hours - cleanup/health check
